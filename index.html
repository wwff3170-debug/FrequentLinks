<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrequentLinks · 智能导航</title>
    <style>
        /* 所有样式保持不变，从之前的最终版完整复制 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0c12;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0a1a24 0%, #1b3e52 40%, #2b5568 70%, #0f2c3a 100%);
            background-size: 300% 300%;
            animation: smoothGradient 20s ease infinite;
        }

        .dynamic-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 50%, rgba(100, 220, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 30%, rgba(180, 130, 255, 0.1) 0%, transparent 50%);
            animation: softPulse 15s infinite alternate;
        }

        .light-bar-1, .light-bar-2 {
            position: fixed;
            z-index: -1;
            background: linear-gradient(90deg, transparent, rgba(100, 255, 255, 0.25), rgba(150, 230, 255, 0.4), rgba(100, 255, 255, 0.25), transparent);
            filter: blur(30px);
            border-radius: 100%;
            pointer-events: none;
        }

        .light-bar-1 {
            top: 15%;
            left: -20%;
            width: 140%;
            height: 140px;
            transform: rotate(-5deg);
            animation: slideGlow 18s infinite alternate ease-in-out;
        }

        .light-bar-2 {
            bottom: 10%;
            right: -30%;
            width: 160%;
            height: 100px;
            transform: rotate(8deg);
            background: linear-gradient(90deg, transparent, rgba(180, 220, 255, 0.2), rgba(220, 240, 255, 0.35), rgba(180, 220, 255, 0.2), transparent);
            animation: slideGlow2 22s infinite alternate ease-in-out;
        }

        @keyframes smoothGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes softPulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.9; }
        }

        @keyframes slideGlow {
            0% { transform: rotate(-5deg) translateX(-10%) scale(1); opacity: 0.2; }
            50% { transform: rotate(-3deg) translateX(10%) scale(1.1); opacity: 0.4; }
            100% { transform: rotate(-5deg) translateX(-10%) scale(1); opacity: 0.2; }
        }

        @keyframes slideGlow2 {
            0% { transform: rotate(8deg) translateX(10%) scale(1); opacity: 0.15; }
            50% { transform: rotate(5deg) translateX(-10%) scale(1.2); opacity: 0.3; }
            100% { transform: rotate(8deg) translateX(10%) scale(1); opacity: 0.15; }
        }

        .category-sidebar {
            width: 240px;
            height: 100vh;
            background: transparent;
            backdrop-filter: blur(18px) saturate(200%);
            -webkit-backdrop-filter: blur(18px) saturate(200%);
            border-right: 1px solid rgba(0, 200, 255, 0.1);
            box-shadow: 4px 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #2aa0b0 #1f3340;
        }

        .category-sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .category-sidebar::-webkit-scrollbar-track {
            background: #1f3340;
        }
        .category-sidebar::-webkit-scrollbar-thumb {
            background: #2aa0b0;
            border-radius: 20px;
        }

        .site-title {
            padding: 20px 16px 16px 20px;
            border-bottom: 1px solid rgba(0, 200, 255, 0.15);
            margin-bottom: 12px;
        }
        .site-title h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #e0f4ff, #b0e0ff, #90d0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #20c0ffaa;
            line-height: 1.2;
        }
        .site-title .sub {
            font-size: 0.7rem;
            color: #8ab0c0;
            letter-spacing: 1px;
            margin-top: 4px;
            opacity: 0.8;
        }

        .category-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 12px 20px 12px;
        }

        .category-item {
            padding: 14px 16px;
            border-radius: 8px;
            color: #d0e6f5;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            text-shadow: 0 0 8px rgba(0,180,255,0.3);
            background: transparent;
            backdrop-filter: blur(2px);
        }

        .category-item:hover {
            border-color: rgba(0, 255, 255, 0.3);
            color: white;
            transform: translateX(6px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            background: transparent;
        }

        .category-item.active {
            border-color: rgba(0, 255, 255, 0.5);
            color: white;
            box-shadow: 0 0 18px rgba(0, 200, 255, 0.3);
            font-weight: 600;
            background: transparent;
        }

        .admin-toggle {
            margin: 16px 12px 20px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(0, 200, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #b0f0ff;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            font-weight: 500;
        }
        .admin-toggle:hover {
            background: rgba(0, 200, 255, 0.25);
            color: white;
            box-shadow: 0 0 15px cyan;
        }

        .content-area {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 30px 40px;
            position: relative;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2aa0b0 #1f3340;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }
        .content-area::-webkit-scrollbar-track {
            background: #1f3340;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: #2aa0b0;
            border-radius: 20px;
        }

        .current-category-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            color: transparent;
            background: linear-gradient(135deg, #fff, #c0eaff);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 30px #0af;
            border-left: 6px solid #2dd4bf;
            padding-left: 24px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .nav-card {
            background: rgba(20, 40, 55, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 200, 255, 0.15);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            color: #ecf9ff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            outline: none;
        }

        .nav-card:hover {
            background: rgba(35, 70, 100, 0.6);
            backdrop-filter: blur(16px);
            border-color: rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.2), 0 15px 25px rgba(0, 0, 0, 0.5);
            transform: translateY(-6px) scale(1.02);
            color: white;
        }

        .nav-card:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 5px 15px rgba(0, 200, 255, 0.3);
            transition: 0.1s;
        }

        .message-box {
            color: #cce5ff;
            padding: 40px;
            text-align: center;
            background: rgba(0, 200, 255, 0.05);
            border-radius: 40px;
            border: 1px dashed rgba(0, 255, 255, 0.3);
            font-size: 1.3rem;
            margin-top: 60px;
            backdrop-filter: blur(8px);
        }

        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .admin-panel {
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid cyan;
            border-radius: 32px;
            padding: 25px;
            color: white;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0,255,255,0.3);
        }
        .admin-panel h2 {
            margin-bottom: 20px;
            font-weight: 300;
            border-bottom: 1px solid #2aa0b0;
            padding-bottom: 10px;
        }
        .admin-panel input, .admin-panel select {
            background: rgba(255,255,255,0.1);
            border: 1px solid #2aa0b0;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            margin-right: 10px;
            margin-bottom: 10px;
            width: 200px;
        }
        .admin-panel button {
            background: rgba(0,200,255,0.2);
            border: 1px solid cyan;
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 8px;
        }
        .admin-panel button:hover {
            background: rgba(0,200,255,0.4);
            box-shadow: 0 0 15px cyan;
        }
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #2aa0b0;
            padding: 10px;
            text-align: left;
        }
        th {
            background: rgba(0,200,255,0.2);
            font-weight: 500;
        }
        td input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 4px;
        }
        td input:focus {
            outline: 1px solid cyan;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: cyan;
            cursor: pointer;
            margin: 0 4px;
            font-size: 1.2rem;
        }
        .action-btn:hover {
            text-shadow: 0 0 8px cyan;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
        }
        .close-btn {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
        }
        .close-btn:hover {
            color: white;
        }

        @media (max-width: 700px) {
            .category-sidebar { width: 180px; }
            .content-area { padding: 20px; }
            .current-category-title { font-size: 2rem; }
            .links-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="dynamic-bg"></div>
    <div class="light-bar-1"></div>
    <div class="light-bar-2"></div>

    <aside class="category-sidebar">
        <div class="site-title">
            <h1>FrequentLinks</h1>
            <div class="sub">智能分类 · 极速直达</div>
        </div>
        <div class="category-list" id="category-list"></div>
        <div class="admin-toggle" id="adminToggle">⚙️ 管理</div>
    </aside>

    <main class="content-area" id="content-area">
        <div class="current-category-title" id="current-category-title">AI</div>
        <div class="links-grid" id="links-grid"></div>
        <div id="message-area" style="display: none;"></div>
    </main>

    <div id="adminModal" class="admin-modal" style="display: none;">
        <div class="admin-panel">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2>🔧 管理员面板</h2>
            <div>
                <input type="text" id="githubToken" placeholder="GitHub Token" />
                <input type="text" id="repoOwner" placeholder="仓库所有者" />
                <input type="text" id="repoName" placeholder="仓库名" />
                <input type="text" id="filePath" placeholder="文件路径 (如 FrequentLinks.csv)" value="FrequentLinks.csv" />
                <button id="loadCsvBtn">加载CSV</button>
                <button id="saveToGithubBtn">保存到仓库</button>
                <button id="exitAdminBtn">退出管理</button>
            </div>
            <div class="table-container">
                <table id="editTable">
                    <thead>
                        <tr><th>类别</th><th>名称</th><th>网址</th><th>操作</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <button id="addRowBtn" style="margin-top: 10px;">➕ 添加新行</button>
            </div>
            <div id="adminStatus" class="status"></div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 基础导航功能 ----------
            const CATEGORIES_ORDER = ["AI", "报刊导航", "社交媒体", "工作", "实用工具", "学习", "代码", "影视", "其他"];
            let allLinks = [];
            let currentCategory = CATEGORIES_ORDER[0];

            const categoryListEl = document.getElementById('category-list');
            const currentTitleEl = document.getElementById('current-category-title');
            const linksGridEl = document.getElementById('links-grid');
            const messageAreaEl = document.getElementById('message-area');

            // 管理员相关元素
            const adminToggle = document.getElementById('adminToggle');
            const adminModal = document.getElementById('adminModal');
            const closeModal = document.getElementById('closeModal');
            const githubToken = document.getElementById('githubToken');
            const repoOwner = document.getElementById('repoOwner');
            const repoName = document.getElementById('repoName');
            const filePath = document.getElementById('filePath');
            const loadCsvBtn = document.getElementById('loadCsvBtn');
            const saveToGithubBtn = document.getElementById('saveToGithubBtn');
            const exitAdminBtn = document.getElementById('exitAdminBtn');
            const tableBody = document.getElementById('tableBody');
            const addRowBtn = document.getElementById('addRowBtn');
            const adminStatus = document.getElementById('adminStatus');

            let editData = [];

            // ----- 工具函数 -----
            function fixUrl(rawUrl) {
                if (!rawUrl || rawUrl.trim() === '') return '#';
                let url = rawUrl.trim();
                url = url.replace(/\s+/g, '');
                if (url.startsWith('https:/') && !url.startsWith('https://')) url = 'https://' + url.substring(6);
                else if (url.startsWith('http:/') && !url.startsWith('http://')) url = 'http://' + url.substring(5);
                else if (url.startsWith('http//') && !url.startsWith('http://')) url = 'http://' + url.substring(6);
                else if (url.startsWith('https//') && !url.startsWith('https://')) url = 'https://' + url.substring(7);
                else if (url.startsWith('http.//')) url = 'http://' + url.substring(6);
                else if (url.startsWith('https.//')) url = 'https://' + url.substring(7);
                if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
                return url;
            }

            // 解析CSV（假设无引号包裹，简单分割）
            function parseCSV(csvText) {
                const lines = csvText.split(/\r?\n/);
                const links = [];
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line === '') continue;
                    const parts = line.split(',').map(s => s.trim());
                    if (parts.length >= 3) {
                        const url = parts.slice(2).join(',').trim();
                        links.push({
                            category: parts[0],
                            name: parts[1],
                            url: fixUrl(url)
                        });
                    }
                }
                return links;
            }

            // 将链接数组转换为CSV字符串（带表头）
            function linksToCSV(links) {
                let csv = "类型,名称,网址\n";
                links.forEach(item => {
                    // 注意：如果内容包含逗号或引号，需要更严格的CSV处理，但本场景较简单
                    csv += `${item.category},${item.name},${item.url}\n`;
                });
                return csv;
            }

            // ---------- Unicode 安全的 Base64 编码/解码 ----------
            function utf8ToBase64(str) {
                // 将 UTF-8 字符串转换为字节数组，再转为 binary string 后用 btoa
                const utf8Bytes = new TextEncoder().encode(str);
                let binary = '';
                for (let i = 0; i < utf8Bytes.length; i++) {
                    binary += String.fromCharCode(utf8Bytes[i]);
                }
                return btoa(binary);
            }

            function base64ToUtf8(base64) {
                // 解码 base64 为 binary string，再转换为 UTF-8 字符串
                const binaryString = atob(base64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                return new TextDecoder('utf-8').decode(bytes);
            }

            // ---------- 渲染 ----------
            function renderCategoryList(activeCategory) {
                categoryListEl.innerHTML = '';
                CATEGORIES_ORDER.forEach(cat => {
                    const item = document.createElement('div');
                    item.className = `category-item ${cat === activeCategory ? 'active' : ''}`;
                    item.textContent = cat;
                    item.dataset.category = cat;
                    item.addEventListener('click', () => {
                        if (currentCategory === cat) return;
                        currentCategory = cat;
                        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        renderCurrentCategory();
                    });
                    categoryListEl.appendChild(item);
                });
            }

            function renderCurrentCategory() {
                currentTitleEl.textContent = currentCategory;
                const filtered = allLinks.filter(link => link.category === currentCategory);
                linksGridEl.innerHTML = '';
                if (filtered.length === 0) {
                    messageAreaEl.style.display = 'block';
                    messageAreaEl.className = 'message-box';
                    messageAreaEl.textContent = '📭 该分类下暂无链接';
                    return;
                }
                messageAreaEl.style.display = 'none';
                filtered.forEach(link => {
                    const card = document.createElement('a');
                    card.href = link.url;
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';
                    card.className = 'nav-card';
                    card.textContent = link.name;
                    linksGridEl.appendChild(card);
                });
            }

            // 从本地 CSV 加载（普通浏览模式）
            function loadCSVAndRender() {
                fetch('./FrequentLinks.csv')
                    .then(response => {
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return response.text();
                    })
                    .then(csvText => {
                        if (csvText.charCodeAt(0) === 0xFEFF) csvText = csvText.slice(1);
                        allLinks = parseCSV(csvText);
                        renderCategoryList(currentCategory);
                        renderCurrentCategory();
                    })
                    .catch(error => {
                        console.error('加载CSV失败:', error);
                        categoryListEl.innerHTML = `<div style="color:#faa; padding:20px;">❌ 加载失败<br>${error.message}</div>`;
                        linksGridEl.innerHTML = `<div class="message-box">❌ 无法加载CSV文件，请确保它与网页同目录</div>`;
                    });
            }

            // ---------- 管理员面板 ----------
            function renderEditTable() {
                tableBody.innerHTML = '';
                editData.forEach((item, index) => {
                    const row = document.createElement('tr');
                    const categoryCell = document.createElement('td');
                    const catInput = document.createElement('input');
                    catInput.value = item.category;
                    catInput.setAttribute('data-index', index);
                    catInput.setAttribute('data-field', 'category');
                    catInput.addEventListener('input', updateEditData);
                    categoryCell.appendChild(catInput);

                    const nameCell = document.createElement('td');
                    const nameInput = document.createElement('input');
                    nameInput.value = item.name;
                    nameInput.setAttribute('data-index', index);
                    nameInput.setAttribute('data-field', 'name');
                    nameInput.addEventListener('input', updateEditData);
                    nameCell.appendChild(nameInput);

                    const urlCell = document.createElement('td');
                    const urlInput = document.createElement('input');
                    urlInput.value = item.url;
                    urlInput.setAttribute('data-index', index);
                    urlInput.setAttribute('data-field', 'url');
                    urlInput.addEventListener('input', updateEditData);
                    urlCell.appendChild(urlInput);

                    const actionCell = document.createElement('td');
                    const delBtn = document.createElement('span');
                    delBtn.innerHTML = '🗑️';
                    delBtn.className = 'action-btn';
                    delBtn.title = '删除';
                    delBtn.addEventListener('click', () => deleteRow(index));
                    actionCell.appendChild(delBtn);

                    row.appendChild(categoryCell);
                    row.appendChild(nameCell);
                    row.appendChild(urlCell);
                    row.appendChild(actionCell);
                    tableBody.appendChild(row);
                });
            }

            function updateEditData(e) {
                const input = e.target;
                const index = input.getAttribute('data-index');
                const field = input.getAttribute('data-field');
                editData[index][field] = input.value;
            }

            function deleteRow(index) {
                editData.splice(index, 1);
                renderEditTable();
            }

            // 打开管理员面板
            adminToggle.addEventListener('click', () => {
                adminModal.style.display = 'flex';
                editData = JSON.parse(JSON.stringify(allLinks));
                renderEditTable();
            });

            closeModal.addEventListener('click', () => {
                adminModal.style.display = 'none';
            });

            exitAdminBtn.addEventListener('click', () => {
                adminModal.style.display = 'none';
            });

            addRowBtn.addEventListener('click', () => {
                editData.push({ category: '其他', name: '新链接', url: 'https://' });
                renderEditTable();
            });

            // 加载CSV按钮：从GitHub读取（使用正确的UTF-8解码）
            loadCsvBtn.addEventListener('click', async () => {
                const token = githubToken.value.trim();
                const owner = repoOwner.value.trim();
                const repo = repoName.value.trim();
                const path = filePath.value.trim();
                if (!token || !owner || !repo || !path) {
                    adminStatus.innerText = '请填写所有字段';
                    return;
                }
                adminStatus.innerText = '加载中...';
                try {
                    const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    if (!response.ok) throw new Error(`GitHub API错误: ${response.status}`);
                    const data = await response.json();
                    // 使用 base64ToUtf8 解码
                    const content = base64ToUtf8(data.content);
                    // 移除可能的BOM
                    const cleanContent = content.charCodeAt(0) === 0xFEFF ? content.slice(1) : content;
                    allLinks = parseCSV(cleanContent);
                    editData = JSON.parse(JSON.stringify(allLinks));
                    renderEditTable();
                    adminStatus.innerText = '加载成功';
                } catch (e) {
                    adminStatus.innerText = `加载失败: ${e.message}`;
                }
            });

            // 保存到GitHub（使用正确的UTF-8编码）
            saveToGithubBtn.addEventListener('click', async () => {
                const token = githubToken.value.trim();
                const owner = repoOwner.value.trim();
                const repo = repoName.value.trim();
                const path = filePath.value.trim();
                if (!token || !owner || !repo || !path) {
                    adminStatus.innerText = '请填写所有字段';
                    return;
                }
                adminStatus.innerText = '保存中...';
                try {
                    // 获取当前文件 sha
                    const getResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    if (!getResponse.ok) throw new Error(`获取文件信息失败: ${getResponse.status}`);
                    const fileData = await getResponse.json();
                    const sha = fileData.sha;

                    // 生成新CSV内容并使用 utf8ToBase64 编码
                    const newCsv = linksToCSV(editData);
                    const contentEncoded = utf8ToBase64(newCsv);

                    // 提交更新
                    const putResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: '更新链接 (via admin panel)',
                            content: contentEncoded,
                            sha: sha
                        })
                    });
                    if (!putResponse.ok) throw new Error(`提交失败: ${putResponse.status}`);
                    adminStatus.innerText = '保存成功！页面将刷新。';
                    setTimeout(() => location.reload(), 1500);
                } catch (e) {
                    adminStatus.innerText = `保存失败: ${e.message}`;
                }
            });

            // 点击模态框外部关闭
            window.addEventListener('click', (e) => {
                if (e.target === adminModal) adminModal.style.display = 'none';
            });

            // 初始化
            loadCSVAndRender();
        })();
    </script>
</body>
</html>
