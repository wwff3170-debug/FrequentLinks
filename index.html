<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrequentLinks · 智能导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b0d10;
            display: flex;
            overflow: hidden;  /* 防止整体滚动，内部区域各自滚动 */
        }

        /* ===== 动态背景（同前） ===== */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 40%, #1a2f3f 0%, #0a121c 70%);
            animation: breathe 16s infinite alternate ease-in-out;
        }

        .dynamic-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 70% 30%, rgba(0, 180, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(150, 0, 255, 0.1) 0%, transparent 45%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
            animation: moveGlow 28s infinite linear;
            transform-origin: center center;
        }

        @keyframes breathe {
            0% { opacity: 0.8; filter: brightness(1); }
            50% { opacity: 1; filter: brightness(1.2); }
            100% { opacity: 0.8; filter: brightness(1); }
        }

        @keyframes moveGlow {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(3deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* ===== 左侧分类导航栏 ===== */
        .category-sidebar {
            width: 240px;
            height: 100vh;
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 4px 0 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #2c9faf #1e2a36;
        }

        .category-sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .category-sidebar::-webkit-scrollbar-track {
            background: #1e2a36;
        }
        .category-sidebar::-webkit-scrollbar-thumb {
            background: #2c9faf;
            border-radius: 20px;
        }

        .site-title {
            padding: 28px 16px 20px 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 16px;
        }
        .site-title h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #c0f0ff, #8ad0ff, #60c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px #00ccff88;
            line-height: 1.2;
        }
        .site-title .sub {
            font-size: 0.7rem;
            color: #6a8f9f;
            letter-spacing: 1px;
            margin-top: 4px;
            opacity: 0.8;
        }

        /* 分类列表 */
        .category-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 10px 20px 10px;
        }

        .category-item {
            padding: 14px 16px;
            margin: 2px 0;
            border-radius: 16px;
            color: #b0d4e8;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            text-shadow: 0 0 5px rgba(0,160,255,0.3);
            backdrop-filter: blur(4px);
        }

        .category-item:hover {
            background: rgba(30, 100, 140, 0.5);
            border-color: #2dd4bf;
            color: white;
            transform: translateX(6px);
            box-shadow: 0 0 15px #00ffff80;
        }

        .category-item.active {
            background: rgba(0, 200, 255, 0.25);
            border-color: #0ff;
            color: white;
            box-shadow: 0 0 20px cyan;
            font-weight: 600;
        }

        /* ===== 右侧内容区 ===== */
        .content-area {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 30px 40px;
            position: relative;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2c9faf #1e2a36;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }
        .content-area::-webkit-scrollbar-track {
            background: #1e2a36;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: #2c9faf;
            border-radius: 20px;
        }

        /* 分类标题（右侧顶部） */
        .current-category-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            color: transparent;
            background: linear-gradient(135deg, #fff, #a0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 20px #0af;
            border-left: 6px solid #2dd4bf;
            padding-left: 24px;
        }

        /* 卡片网格 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background: rgba(15, 30, 45, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 24px;
            padding: 24px 16px;
            text-align: center;
            color: #edf5ff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .nav-card:hover {
            background: rgba(30, 100, 150, 0.8);
            border-color: #0ff;
            box-shadow: 0 0 30px #00ffff, 0 12px 28px rgba(0, 200, 255, 0.4);
            transform: translateY(-6px) scale(1.02);
            color: white;
        }

        .nav-card:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px cyan;
        }

        /* 加载/错误提示 */
        .message-box {
            color: #aad0f0;
            padding: 30px;
            text-align: center;
            background: rgba(0,255,255,0.05);
            border-radius: 32px;
            border: 1px dashed #2c9faf;
            font-size: 1.2rem;
            margin-top: 50px;
        }

        /* 小屏幕适配 */
        @media (max-width: 700px) {
            .category-sidebar {
                width: 180px;
            }
            .content-area {
                padding: 20px;
            }
            .current-category-title {
                font-size: 2rem;
            }
            .links-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="dynamic-bg"></div>

    <!-- 左侧分类导航 -->
    <aside class="category-sidebar">
        <div class="site-title">
            <h1>FrequentLinks</h1>
            <div class="sub">智能分类·一键触达</div>
        </div>
        <div class="category-list" id="category-list">
            <!-- 动态生成分类项 -->
        </div>
    </aside>

    <!-- 右侧内容展示区 -->
    <main class="content-area" id="content-area">
        <div class="current-category-title" id="current-category-title">AI</div>
        <div class="links-grid" id="links-grid">
            <!-- 动态生成当前分类的卡片 -->
        </div>
        <div id="message-area" style="display: none;"></div>
    </main>

    <script>
        (function() {
            // 预定义的分类顺序（也是左侧显示顺序）
            const CATEGORIES_ORDER = ["AI", "报刊导航", "社交媒体", "工作", "实用工具", "学习", "代码", "影视", "其他"];
            
            // 状态：存储所有链接数据
            let allLinks = [];
            // 当前选中的分类
            let currentCategory = CATEGORIES_ORDER[0]; // 默认第一个

            // DOM 元素
            const categoryListEl = document.getElementById('category-list');
            const currentTitleEl = document.getElementById('current-category-title');
            const linksGridEl = document.getElementById('links-grid');
            const messageAreaEl = document.getElementById('message-area');

            // 智能修复URL
            function fixUrl(rawUrl) {
                if (!rawUrl || rawUrl.trim() === '') return '#';
                let url = rawUrl.trim();
                url = url.replace(/\s+/g, '');
                
                if (url.startsWith('https:/') && !url.startsWith('https://')) {
                    url = 'https://' + url.substring(6);
                } else if (url.startsWith('http:/') && !url.startsWith('http://')) {
                    url = 'http://' + url.substring(5);
                } else if (url.startsWith('http//') && !url.startsWith('http://')) {
                    url = 'http://' + url.substring(6);
                } else if (url.startsWith('https//') && !url.startsWith('https://')) {
                    url = 'https://' + url.substring(7);
                } else if (url.startsWith('http.//')) {
                    url = 'http://' + url.substring(6);
                } else if (url.startsWith('https.//')) {
                    url = 'https://' + url.substring(7);
                }
                
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                return url;
            }

            // 解析CSV行
            function parseCSVLine(line) {
                const parts = line.split(',').map(s => s.trim());
                if (parts.length < 3) return null;
                return {
                    category: parts[0],
                    name: parts[1],
                    url: parts.slice(2).join(',').trim()
                };
            }

            // 解析完整CSV文本
            function parseCSV(csvText) {
                const lines = csvText.split(/\r?\n/);
                const links = [];
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line === '') continue;
                    const parsed = parseCSVLine(line);
                    if (parsed && parsed.category && parsed.name && parsed.url) {
                        parsed.url = fixUrl(parsed.url);
                        links.push(parsed);
                    }
                }
                return links;
            }

            // 渲染左侧分类列表
            function renderCategoryList(activeCategory) {
                categoryListEl.innerHTML = '';
                CATEGORIES_ORDER.forEach(cat => {
                    const item = document.createElement('div');
                    item.className = `category-item ${cat === activeCategory ? 'active' : ''}`;
                    item.textContent = cat;
                    item.dataset.category = cat;
                    item.addEventListener('click', () => {
                        if (currentCategory === cat) return;
                        currentCategory = cat;
                        // 更新激活样式
                        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        // 更新右侧标题和卡片
                        renderCurrentCategory();
                    });
                    categoryListEl.appendChild(item);
                });
            }

            // 根据 currentCategory 渲染右侧内容
            function renderCurrentCategory() {
                currentTitleEl.textContent = currentCategory;
                const filtered = allLinks.filter(link => link.category === currentCategory);
                
                linksGridEl.innerHTML = '';
                if (filtered.length === 0) {
                    // 显示空状态提示
                    messageAreaEl.style.display = 'block';
                    messageAreaEl.className = 'message-box';
                    messageAreaEl.textContent = '📭 该分类下暂无链接';
                    return;
                }
                messageAreaEl.style.display = 'none';

                filtered.forEach(link => {
                    const card = document.createElement('a');
                    card.href = link.url;
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';
                    card.className = 'nav-card';
                    card.textContent = link.name;
                    linksGridEl.appendChild(card);
                });
            }

            // 从CSV加载数据并初始化UI
            function loadCSVAndRender() {
                fetch('./FrequentLinks.csv')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        return response.text();
                    })
                    .then(csvText => {
                        // 移除BOM
                        if (csvText.charCodeAt(0) === 0xFEFF) {
                            csvText = csvText.slice(1);
                        }
                        allLinks = parseCSV(csvText);
                        
                        // 渲染左侧分类（传入当前选中）
                        renderCategoryList(currentCategory);
                        // 渲染右侧当前分类
                        renderCurrentCategory();
                    })
                    .catch(error => {
                        console.error('加载CSV失败:', error);
                        categoryListEl.innerHTML = `<div style="color:#faa; padding:20px;">❌ 加载失败<br>${error.message}</div>`;
                        linksGridEl.innerHTML = `<div class="message-box">❌ 无法加载CSV文件，请确保它与网页同目录</div>`;
                    });
            }

            // 启动
            loadCSVAndRender();
        })();
    </script>
</body>
</html>
