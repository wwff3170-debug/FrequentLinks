<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrequentLinks · 智能导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0c12;
            display: flex;
            overflow: hidden;
        }

        /* ===== 增强版智能动态背景 ===== */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(125deg, #0a1922 0%, #1b3a4b 30%, #2b4b5e 70%, #0f2a38 100%);
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
        }

        .dynamic-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 30% 50%, rgba(100, 220, 255, 0.2) 0%, transparent 35%),
                radial-gradient(circle at 80% 20%, rgba(200, 100, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 10% 80%, rgba(0, 255, 200, 0.1) 0%, transparent 45%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 4px, transparent 4px, transparent 12px);
            animation: moveLight 24s infinite alternate;
            mix-blend-mode: overlay;
        }

        .dynamic-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 60% 40%, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: pulseGlow 8s infinite alternate;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes moveLight {
            0% { transform: rotate(0deg) scale(1); opacity: 0.6; }
            50% { transform: rotate(5deg) scale(1.1); opacity: 0.9; }
            100% { transform: rotate(-5deg) scale(1.2); opacity: 0.6; }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }

        /* ===== 左侧分类导航栏 ===== */
        .category-sidebar {
            width: 240px;
            height: 100vh;
            background: rgba(8, 18, 28, 0.7);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border-right: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow: 4px 0 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            z-index: 10;
            position: relative;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #2aa0b0 #1f3340;
        }

        .category-sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .category-sidebar::-webkit-scrollbar-track {
            background: #1f3340;
        }
        .category-sidebar::-webkit-scrollbar-thumb {
            background: #2aa0b0;
            border-radius: 20px;
        }

        .site-title {
            padding: 24px 16px 16px 20px;
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
            margin-bottom: 12px;
        }
        .site-title h1 {
            font-size: 1.8rem;  /* 适当减小，确保完整显示 */
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #d0f0ff, #9ad0ff, #7ac8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #00ccffaa;
            line-height: 1.2;
        }
        .site-title .sub {
            font-size: 0.7rem;
            color: #8ab0c0;
            letter-spacing: 1px;
            margin-top: 4px;
            opacity: 0.8;
        }

        /* 分类列表 */
        .category-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 12px 20px 12px;
        }

        .category-item {
            padding: 14px 16px;
            border-radius: 20px;
            color: #c0e0f0;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
            text-shadow: 0 0 8px rgba(0,200,255,0.4);
            backdrop-filter: blur(4px);
        }

        .category-item:hover {
            background: rgba(40, 120, 180, 0.4);
            border-color: #2dd4bf;
            color: white;
            transform: translateX(6px);
            box-shadow: 0 0 20px #00ffffb0;
        }

        .category-item.active {
            background: rgba(0, 180, 240, 0.3);
            border-color: #0ff;
            color: white;
            box-shadow: 0 0 25px cyan;
            font-weight: 600;
        }

        /* ===== 右侧内容区 ===== */
        .content-area {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 30px 40px;
            position: relative;
            z-index: 5;
            scrollbar-width: thin;
            scrollbar-color: #2aa0b0 #1f3340;
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }
        .content-area::-webkit-scrollbar-track {
            background: #1f3340;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: #2aa0b0;
            border-radius: 20px;
        }

        .current-category-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            color: transparent;
            background: linear-gradient(135deg, #fff, #b0eaff);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 30px #0af;
            border-left: 6px solid #2dd4bf;
            padding-left: 24px;
        }

        /* 卡片网格 - 调大最小宽度，让卡片更宽 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .nav-card {
            background: rgba(18, 35, 50, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            color: #ecf9ff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            /* 移除点击时的明显边框，改为柔光 */
            outline: none;
        }

        .nav-card:hover {
            background: rgba(30, 90, 140, 0.8);
            border-color: #0ff;
            box-shadow: 0 0 35px #00ffff, 0 15px 30px rgba(0, 200, 255, 0.4);
            transform: translateY(-8px) scale(1.02);
            color: white;
        }

        .nav-card:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 5px 20px cyan;
            transition: 0.1s;
        }

        .message-box {
            color: #c0e0ff;
            padding: 40px;
            text-align: center;
            background: rgba(0,255,255,0.05);
            border-radius: 40px;
            border: 1px dashed #2dd4bf;
            font-size: 1.3rem;
            margin-top: 60px;
            backdrop-filter: blur(8px);
        }

        @media (max-width: 700px) {
            .category-sidebar {
                width: 180px;
            }
            .content-area {
                padding: 20px;
            }
            .current-category-title {
                font-size: 2rem;
            }
            .links-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="dynamic-bg"></div>

    <!-- 左侧分类导航 -->
    <aside class="category-sidebar">
        <div class="site-title">
            <h1>FrequentLinks</h1>
            <div class="sub">智能分类 · 极速直达</div>
        </div>
        <div class="category-list" id="category-list"></div>
    </aside>

    <!-- 右侧内容展示区 -->
    <main class="content-area" id="content-area">
        <div class="current-category-title" id="current-category-title">AI</div>
        <div class="links-grid" id="links-grid"></div>
        <div id="message-area" style="display: none;"></div>
    </main>

    <script>
        (function() {
            const CATEGORIES_ORDER = ["AI", "报刊导航", "社交媒体", "工作", "实用工具", "学习", "代码", "影视", "其他"];
            
            let allLinks = [];
            let currentCategory = CATEGORIES_ORDER[0];

            const categoryListEl = document.getElementById('category-list');
            const currentTitleEl = document.getElementById('current-category-title');
            const linksGridEl = document.getElementById('links-grid');
            const messageAreaEl = document.getElementById('message-area');

            function fixUrl(rawUrl) {
                if (!rawUrl || rawUrl.trim() === '') return '#';
                let url = rawUrl.trim();
                url = url.replace(/\s+/g, '');
                
                if (url.startsWith('https:/') && !url.startsWith('https://')) {
                    url = 'https://' + url.substring(6);
                } else if (url.startsWith('http:/') && !url.startsWith('http://')) {
                    url = 'http://' + url.substring(5);
                } else if (url.startsWith('http//') && !url.startsWith('http://')) {
                    url = 'http://' + url.substring(6);
                } else if (url.startsWith('https//') && !url.startsWith('https://')) {
                    url = 'https://' + url.substring(7);
                } else if (url.startsWith('http.//')) {
                    url = 'http://' + url.substring(6);
                } else if (url.startsWith('https.//')) {
                    url = 'https://' + url.substring(7);
                }
                
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                return url;
            }

            function parseCSVLine(line) {
                const parts = line.split(',').map(s => s.trim());
                if (parts.length < 3) return null;
                return {
                    category: parts[0],
                    name: parts[1],
                    url: parts.slice(2).join(',').trim()
                };
            }

            function parseCSV(csvText) {
                const lines = csvText.split(/\r?\n/);
                const links = [];
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line === '') continue;
                    const parsed = parseCSVLine(line);
                    if (parsed && parsed.category && parsed.name && parsed.url) {
                        parsed.url = fixUrl(parsed.url);
                        links.push(parsed);
                    }
                }
                return links;
            }

            function renderCategoryList(activeCategory) {
                categoryListEl.innerHTML = '';
                CATEGORIES_ORDER.forEach(cat => {
                    const item = document.createElement('div');
                    item.className = `category-item ${cat === activeCategory ? 'active' : ''}`;
                    item.textContent = cat;
                    item.dataset.category = cat;
                    item.addEventListener('click', () => {
                        if (currentCategory === cat) return;
                        currentCategory = cat;
                        document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        renderCurrentCategory();
                    });
                    categoryListEl.appendChild(item);
                });
            }

            function renderCurrentCategory() {
                currentTitleEl.textContent = currentCategory;
                const filtered = allLinks.filter(link => link.category === currentCategory);
                
                linksGridEl.innerHTML = '';
                if (filtered.length === 0) {
                    messageAreaEl.style.display = 'block';
                    messageAreaEl.className = 'message-box';
                    messageAreaEl.textContent = '📭 该分类下暂无链接';
                    return;
                }
                messageAreaEl.style.display = 'none';

                filtered.forEach(link => {
                    const card = document.createElement('a');
                    card.href = link.url;
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';
                    card.className = 'nav-card';
                    card.textContent = link.name;
                    linksGridEl.appendChild(card);
                });
            }

            function loadCSVAndRender() {
                fetch('./FrequentLinks.csv')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }
                        return response.text();
                    })
                    .then(csvText => {
                        if (csvText.charCodeAt(0) === 0xFEFF) {
                            csvText = csvText.slice(1);
                        }
                        allLinks = parseCSV(csvText);
                        renderCategoryList(currentCategory);
                        renderCurrentCategory();
                    })
                    .catch(error => {
                        console.error('加载CSV失败:', error);
                        categoryListEl.innerHTML = `<div style="color:#faa; padding:20px;">❌ 加载失败<br>${error.message}</div>`;
                        linksGridEl.innerHTML = `<div class="message-box">❌ 无法加载CSV文件，请确保它与网页同目录</div>`;
                    });
            }

            loadCSVAndRender();
        })();
    </script>
</body>
</html>
